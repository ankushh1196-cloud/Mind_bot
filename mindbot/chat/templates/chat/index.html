<!DOCTYPE html>
<html>
<head>
    <title>MindBot</title>

    <style>
        * {

            padding: 0;

            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", sans-serif;
        }
        .bg-orb {
    animation: float 12s infinite alternate ease-in-out,
               pulse 6s infinite ease-in-out;
}
        #typeText {
    font-size: 32px;
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
}



@keyframes blink {
    50% { opacity: 0; }
}


@keyframes pulse {
    0%,100% { opacity: 0.3; }

}

        background-position: 20% 30%, 80% 70%, 50% 50%;
    }
    50% {
        background-position: 25% 35%, 75% 65%, 50% 50%;
    }
    100% {
        background-position: 20% 30%, 80% 70%, 50% 50%;
    }
}
       body::before {
    content: "";
    position: fixed;
    inset: 0;

    background:
        radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 70%);

    pointer-events: none;
}
       html::after {
    content: "";
    position: fixed;
    inset: 0;

    background-image: url("https://www.transparenttextures.com/patterns/noise.png");
    opacity: 0.03;

    pointer-events: none;
}
        body::after {
    content: "";
    position: absolute;

    width: 700px;

    background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 60%);
    filter: blur(120px);

    bottom: -200px;
    right: -150px;

    animation: floatGlow2 20s infinite alternate ease-in-out;
}
        @keyframes floatGlow {
    0% { transform: translate(0, 0); }
    100% { transform: translate(100px, 80px); }
}

@keyframes floatGlow2 {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-120px, -60px); }
}
        body::before {
    content: "";
    position: fixed;
    inset: 0;

    background:
        radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 70%);

    pointer-events: none;
}

    pointer-events: none;
    z-index: 0;
}

@keyframes moveGlow {
    0% {
        transform: translate(-20%, -20%);
    }
    100% {
        transform: translate(40%, 30%);
    }
}

        @keyframes bgMove {
            0% { background-position: 20% 20%; }
            100% { background-position: 80% 80%; }
        }

        /* 🔥 SCROLLBAR (POINT 10) */
        #chatbox::-webkit-scrollbar {
            width: 6px;
        }
        #chatbox::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 10px;
        }
        .user::after {
    content: "";
    position: absolute;
    right: -6px;
    top: 10px;
    border: 6px solid transparent;
    border-left-color: #6366f1;
}

.bot::after {
    content: "";
    position: absolute;
    left: -6px;
    top: 10px;
    border: 6px solid transparent;
    border-right-color: #1f2937;
}


        .mouse-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 60%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
        }



        @keyframes float {
            from { transform: translateY(0px); }
            to { transform: translateY(40px); }
        }
#terminal {
    width: 720px;
    height: 420px;
    margin: 40px 0;

    /* 🔥 richer solid color (not flat black) */
    background: linear-gradient(145deg, #020617, #030a1a);

    border-radius: 16px;
    overflow: hidden;


    /* 🔥 STRONG depth (this is the main fix) */
    box-shadow:
    0 0 40px rgba(99,102,241,0.15);

    border: 1px solid rgba(255,255,255,0.04); /* very subtle edge */

    position: relative;
}

#terminal {
  animation: enter 0.6s ease;
}

@keyframes enter {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
.message {
  animation: fadeIn 0.4s ease;
}
#terminal {
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.05);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}


#terminal::before {
    content: "";
    position: absolute;
    inset: 0;

    border-radius: 16px;

    background: radial-gradient(
        circle at top left,
        rgba(99,102,241,0.12),
        transparent 40%
    );

    pointer-events: none;
}


textarea:focus::placeholder {
    opacity: 0.4;
}
        .msg {
    font-size: 14.5px;
    line-height: 1.5;
}
        .msg + .msg {
    margin-top: 6px;
}

.user + .bot,
.bot + .user {
    margin-top: 14px;
}
        .hide {
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
}

        .terminal-header {
            height: 36px;
            background: #111827;
            display: flex;
            align-items: center;
            padding: 0 12px;
            position: relative;
        }

        .dots { display: flex; gap: 6px; }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .status {
    font-size: 11px;
    color: #22c55e;
    margin-top: 4px;
}

        .term-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #9ca3af;
        }

        .terminal-body {
            padding: 18px 22px;
            font-family: "SF Mono", Menlo, monospace;
        }

        .cursor {
            display: inline-block;
            width: 7px;
            height: 16px;
            background: #9ca3af;
            margin-left: 4px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
        @keyframes breathe {
    0% { transform: scale(1); }
    100% { transform: scale(1.01); }
}

.chat-container {
    width: 540px;
    height: 720px;

    background: linear-gradient(180deg, rgba(17,24,39,0.95), rgba(2,6,23,0.95));



    border-radius: 20px;

    display: flex;
    flex-direction: column;
    position: relative;

    box-shadow:
    0 20px 80px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.06);


    border: 1px solid rgba(99,102,241,0.35);
    .chat-container::before {
    content: "";
    position: absolute;
    inset: 0;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.06),
        transparent
    );

    opacity: 0;
    transition: 0.5s;
}


}
.header .status {
    display: block;
    font-size: 11px;
    margin-top: 4px;

    color: #22c55e !important;   /* FORCE GREEN */
    -webkit-text-fill-color: #22c55e !important; /* override gradient */

    text-shadow: 0 0 8px rgba(34,197,94,0.8);
}

        #mainApp {
            display: none;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }
        @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}


        .showApp {
            display: flex !important;
            opacity: 1 !important;
            transform: translateY(0) scale(1) !important;
        }


        .chat-container {
            width: 540px;
            height: 720px;
            background: linear-gradient(180deg, rgba(17,24,39,0.95), rgba(2,6,23,0.95));

            border-radius: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);

        }
        .typing span {
  width: 6px;
  height: 6px;
  background: #9ca3af;
  border-radius: 50%;
  display: inline-block;
  animation: blink 1.4s infinite;
}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
        @keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(15px) scale(0.98);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

        .header {
            padding: 18px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            background: rgba(15, 23, 42, 0.8);

            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(99,102,241,0.4);
        }

        #chatbox {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .empty-state {
    position: absolute;
    top: 42%;   /* 👈 moved up from 50% */
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}
        .msg {
            margin: 10px 0;
            padding: 14px;
            border-radius: 14px;
            max-width: 75%;
            animation: slideUp 0.25s ease;
        }

        /* 🔥 POINT 8 hover */
        .msg:hover {
            transform: scale(1.02);
            transition: 0.2s;
        }

        .user {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            align-self: flex-end;
        }

        .bot {
            background: #1f2937;
            align-self: flex-start;
        }

        .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 5px;
        }

        /* 🔥 POINT 3 thinking text */
        .typing {
            font-size: 13px;
            color: #9ca3af;
            font-style: italic;
        }

.input-box {
    display: flex;
    align-items: center;   /* 🔥 aligns vertically */
    gap: 10px;             /* clean spacing */
    padding: 12px;
    background: #0f172a;
}

        textarea {
    flex: 1;
    height: 48px;                 /* 🔥 fixed height */
    padding: 12px 14px;

    font-size: 14px;

    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);

    resize: none;                 /* 🔥 removes ugly resize */

}



        /* 🔥 POINT 4 glow */
        textarea:focus {
            box-shadow: 0 0 0 2px #4f46e5, 0 0 20px rgba(79,70,229,0.3);
        }
        .mouse-glow {
    position: fixed;
    width: 400px;
    height: 400px;

    background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 60%);
    filter: blur(100px);

    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 0;
}

        /* 🔥 POINT 5 button */
        button {
    height: 48px;                 /* 🔥 SAME as textarea */
    padding: 0 18px;              /* rectangle */

    font-size: 14px;

    background: #1f2937;
    border: 1px solid rgba(255,255,255,0.08);

    color: #e5e7eb;

    border-radius: 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    cursor: pointer;
    transition: 0.2s ease;
}

/* hover */
        button:hover {
    border-color: #6366f1;
    background: #111827;

}

/* click */
button:active {
    transform: scale(0.96);
}
        body::after {
    content: "";
    position: fixed;
    inset: 0;

    opacity: 0.05;
    pointer-events: none;
}

        button:active {
            transform: scale(0.96);
        }

        button:hover {
            transform: translateY(-2px) scale(1.03);
        }

    </style>
</head>

<body>
<div class="mouse-glow" id="mouseGlow"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div id="terminal">
    <div class="terminal-header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="term-title">MindBot boot</div>
    </div>
    <div class="terminal-body" id="terminal-text"></div>
</div>


<div id="mainApp">
    <div class="chat-container">

        <div class="header">
    Mental Support Assistant
    <div class="status">● Online</div>
</div>
        <div id="emptyState" class="empty-state">
    <h1 id="typeText">How are you feeling Today?</h1>
</div>



        <div id="chatbox"></div>

        <div class="input-box">
            <textarea id="input" placeholder="How are you feeling..."></textarea>
            <button onclick="sendMessage()"> Send</button>
        </div>

    </div>
</div>

<script>

/* TERMINAL */
const text = "How are you feeling today?";
let i = 0;
let isDeleting = false;

// 🔥 FIXED TYPE + DELETE LOOP
function typeEffect() {
    const el = document.getElementById("typeText");

    if (!el) return;

    if (!isDeleting) {
        el.innerHTML = text.substring(0, i) ;
        i++;

        if (i > text.length) {
            isDeleting = true;
            setTimeout(typeEffect, 1000);
            return;
        }
    } else {
        el.innerHTML = text.substring(0, i) ;
        i--;

        if (i < 0) {
            isDeleting = false;
            setTimeout(typeEffect, 500);
            return;
        }
    }

    setTimeout(typeEffect, isDeleting ? 30 : 60);
}

const lines = [
    "Initializing AI core...",
    "Loading neural layers...",
    "Connecting to server...",
    "System ready."
];

let termIndex = 0;

function runTerminal() {
    if (termIndex >= lines.length) {
        setTimeout(() => {
            let term = document.getElementById("terminal");
            term.style.transition = "all 0.8s ease";
            term.style.opacity = "0";

            setTimeout(()=>{
                term.style.display = "none";
                document.getElementById("mainApp").classList.add("showApp");
                typeEffect();
            }, 500);
        }, 800);
        return;
    }

    let div = document.createElement("div");
    document.getElementById("terminal-text").appendChild(div);

    let text = lines[termIndex];
    let j = 0;

    function type() {
        div.innerHTML = "$ " + text.substring(0, j) + "<span class='cursor'></span>";
        j++;

        if (j <= text.length) {
            setTimeout(type, 25);
        } else {
            div.innerHTML = "$ " + text;
            termIndex++;
            setTimeout(runTerminal, 400);
        }
    }

    type();
}

document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
        runTerminal();
    }, 700); // wait for terminal animation to finish
});
/* CHAT */

function getTime(){
    let d = new Date();
    return d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0');
}

function add(msg, sender){
    document.getElementById("emptyState").classList.add("hide");

    let time = getTime();

    let div = document.createElement("div");
    div.classList.add("msg");

    if(sender === "You") div.classList.add("user");
    else div.classList.add("bot");

    div.innerHTML = msg + `<div class="time">${time}</div>`;

    document.getElementById("chatbox").appendChild(div);
    document.getElementById("chatbox").scrollTop =
        document.getElementById("chatbox").scrollHeight;
}


/* 🔥 UPDATED typing */
function showTyping(){
    let typing = document.createElement("div");
    typing.classList.add("msg", "bot", "typing");
    typing.id = "typing";

    let texts = ["Thinking...", "Analyzing...", "Understanding..."];
    typing.innerHTML = texts[Math.floor(Math.random()*texts.length)];

    document.getElementById("chatbox").appendChild(typing);
}

function removeTyping(){
    let t = document.getElementById("typing");
    if(t) t.remove();
}

document.getElementById("input").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        sendMessage()
        input.focus();
    }
});

function typeBotReply(text){
    let div = document.createElement("div");
    div.classList.add("msg", "bot");

    let content = document.createElement("div");
    div.appendChild(content);

    document.getElementById("chatbox").appendChild(div);

    let i = 0;

    function type(){
        content.innerHTML = text.substring(0, i) + "<span class='cursor'></span>";

        document.getElementById("chatbox").scrollTop =
            document.getElementById("chatbox").scrollHeight;

        i++;

        if(i <= text.length){
            setTimeout(type, 12);
        } else {
            content.innerHTML = text;

            let time = document.createElement("div");
            time.classList.add("time");
            time.innerHTML = getTime();
            div.appendChild(time);
        }
    }

    type();
}

document.getElementById("chatbox").scrollTo({
    top: document.getElementById("chatbox").scrollHeight,
    behavior: "smooth"
});

async function sendMessage(){
    let input = document.getElementById("input");
    let msg = input.value.trim();
    if(!msg) return;

    add(msg, "You");
    input.value = "";

    showTyping();

    let res = await fetch(`/chatbot/?message=${encodeURIComponent(msg)}`);
    let data = await res.json();

    removeTyping();
    typeBotReply(data.reply);
}
const delay = Math.random() * 1500 + 500; // 0.5s – 2s

setTimeout(() => {
    removeTyping();
    typeBotReply(data.reply);
}, delay);



</script>
</body>
</html>
